<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>پرداخت</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>
پرداخت
</h1>

</header>



<div class="box">


<h2>
شماره کارت
</h2>


<h2 id="card">
6037997194784360
</h2>


<button onclick="copyCard()">
کپی شماره کارت
</button>



<hr>



<p>
تعداد سکه:
<span id="coinsShow">
0
</span>
</p>



<p>
مبلغ:
<span id="moneyShow">
0
</span>
تومان
</p>



<button onclick="payDone()">

پرداخت کردم

</button>



<h3 id="msg"></h3>


</div>





<script>


let coins =
localStorage.getItem("buyCoins");


let money =
localStorage.getItem("payPrice");



document.getElementById("coinsShow").innerHTML =
Number(coins).toLocaleString();



document.getElementById("moneyShow").innerHTML =
Number(money).toLocaleString();






function copyCard(){


navigator.clipboard.writeText(
"6037997194784360"
);


alert("کپی شد");


}






function payDone(){


let user =
JSON.parse(localStorage.getItem("user"));



if(user){


user.coins += Number(coins);



localStorage.setItem(
"user",
JSON.stringify(user)
);



alert("سکه ها اضافه شد");


location.href="index.html";


}else{


document.getElementById("msg").innerHTML =
"ابتدا وارد حساب شوید";


}



}



</script>


</body>

</html>
