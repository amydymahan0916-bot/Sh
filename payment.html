<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>پرداخت</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>
پرداخت
</h1>

</header>




<div class="box">


<h2>
شماره کارت
</h2>



<h2 id="card">
6037997194784360
</h2>



<button onclick="copyCard()">
کپی شماره کارت
</button>




<hr>



<p>
نام کاربر:
<span id="userName">
-
</span>
</p>



<p>
تعداد سکه:
<span id="coinsShow">
0
</span>
</p>



<p>
مبلغ:
<span id="moneyShow">
0
</span>
تومان
</p>




<button onclick="sendRequest()">

پرداخت کردم

</button>



<h3 id="msg"></h3>



</div>






<script>



let user =
JSON.parse(localStorage.getItem("user"));



let coins =
Number(localStorage.getItem("buyCoins"));



let money =
Number(localStorage.getItem("payPrice"));





if(user){


document.getElementById("userName").innerHTML =
user.name;


}



document.getElementById("coinsShow").innerHTML =
coins.toLocaleString();



document.getElementById("moneyShow").innerHTML =
money.toLocaleString();







function copyCard(){


navigator.clipboard.writeText(
"6037997194784360"
);


alert("شماره کارت کپی شد");


}








function sendRequest(){



if(!user){


alert("ابتدا وارد حساب شوید");

return;


}



let requests =
JSON.parse(localStorage.getItem("requests")) || [];




let request = {


id: Date.now(),


name:user.name,


coins:coins,


money:money,


status:"در انتظار تایید"



};




requests.push(request);




localStorage.setItem(
"requests",
JSON.stringify(requests)
);





document.getElementById("msg").innerHTML =
"درخواست شما ارسال شد و پس از تایید شارژ می‌شود";



}



</script>



</body>

</html>
