<script>

localStorage.getItem("buyCoins");

localStorage.getItem("payPrice");

Number(coins).toLocaleString();

Number(price).toLocaleString();

"6037997194784360"
);

}







function sendPay(){

"پرداخت شما برای پشتیبانی ارسال گردید در اسرع وقت حساب شما شارژ میشود در صورت صحت پرداخت";
