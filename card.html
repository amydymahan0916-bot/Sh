<input 
id="bet"
type="number"
placeholder="حداقل 10000 سکه">

<button onclick="startCard()">

</button>


</div>






<div class="box">


<h2>
مرحله:
<span id="stage">0</span>/8
</h2>


<h2>
ضریب:
×<span id="multi">1</span>
</h2>

موجودی بازی:
<span id="profit">0</span> 🪙
</h2>



</div>








<div id="cards" class="cards">


</div>







<div class="box">


<button onclick="cashOut()">

برداشت سود

</button>


<p id="history">
بازی شروع نشده
</p>


</div>
