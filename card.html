<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Card Master Elite</title>

<link rel="stylesheet" href="card.css">

</head>


<body>


<header>

<h1>
CARD MASTER
<br>
<span>ELITE</span>
</h1>

<div class="balance">
موجودی
<br>
🪙 <b id="money">0</b>
</div>

</header>




<div class="stats">

<div>
ورودی
<strong id="bet">0</strong>
</div>

<div>
سود
<strong id="profit">0</strong>
</div>

<div>
ضریب
<strong id="multi">1×</strong>
</div>

</div>





<div class="gameBox">


<input id="amount" placeholder="مبلغ بازی">


<div class="levels">

<button onclick="setMode('ELITE')">
ELITE
</button>

<button onclick="setMode('NORMAL')">
NORMAL
</button>

<button onclick="setMode('SAFE')">
SAFE
</button>

</div>



<button class="start" onclick="startGame()">
شروع بازی 🎴
</button>


</div>





<div id="cards" class="cards">


</div>





<button class="cash" onclick="cashout()">
برداشت سود 💰
</button>



<button class="again" onclick="resetGame()">
بازی دوباره 🔄
</button>





<div class="result">

<h2 id="resultTitle">
برد ✨
</h2>

<div id="resultText">

</div>

</div>





<script src="card.js"></script>

</body>

</html>
