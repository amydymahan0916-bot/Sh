<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>استاد کارت</title>

<link rel="stylesheet" href="card.css">

</head>


<body>


<div class="particles"></div>



<div class="game-container">



<header class="game-header">


<div class="logo">

<h1>استاد کارت</h1>

<span>MAHAN GAME</span>

</div>




<div class="balance-box">

<div>
موجودی
</div>

<b>
🪙 <span id="coins">0</span>
</b>


</div>


</header>





<section class="game-info">


<div class="info-box">

<span>
ورودی
</span>

<strong id="betView">
0
</strong>

</div>



<div class="info-box">

<span>
سود
</span>

<strong id="profit">
0
</strong>

</div>




<div class="info-box">

<span>
ضریب
</span>

<strong id="multi">
×1
</strong>

</div>


</section>







<section class="control-panel">



<input 
id="bet"
type="number"
placeholder="حداقل ورود 10000 سکه"
>




<div class="risk-panel">


<button onclick="setRisk('safe')">
SAFE
</button>


<button onclick="setRisk('normal')">
NORMAL
</button>


<button onclick="setRisk('hard')">
ELITE
</button>


</div>





<button class="start-btn" onclick="startGame()">

🎴 شروع بازی

</button>


</section>








<section id="cards" class="cards-table">


</section>








<div class="action-panel">


<button 
id="cashout"
onclick="cashOut()"
disabled
>

💰 برداشت سود

</button>




<button onclick="startGame()">

🔄 بازی دوباره

</button>


</div>







<div id="message" class="message-box">

آماده بازی

</div>





</div>





<script src="card.js"></script>


</body>


</html>
