<script src="app.js"></script>


<script>


let user = getUser();



if(user){


document.getElementById("profileName").innerHTML=user.name;


document.getElementById("profileCoins").innerHTML=
"🪙 "+user.coins.toLocaleString();

document.getElementById("winsCount").innerHTML=user.wins;


document.getElementById("lossCount").innerHTML=user.losses;



}
