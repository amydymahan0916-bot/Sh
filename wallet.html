<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>کیف پول</title>

<link rel="stylesheet" href="style.css">

</head>


<body>



<header>


<h1>
💰 کیف پول
</h1>



<div class="coin">

🪙

<span id="coins">
0
</span>

</div>


</header>







<div class="box">


<h2>
موجودی حساب
</h2>



<p>

موجودی فعلی:

</p>



<h2 class="gold">

🪙

<span id="balance">

0

</span>

</h2>



</div>








<div class="box">


<h2>
عملیات کیف پول
</h2>



<a href="charge.html">


<button>

🪙 شارژ حساب

</button>


</a>



<br><br>




<a href="withdraw.html">


<button>

💸 برداشت

</button>


</a>



</div>







<div class="box">


<h2>
تاریخچه درخواست‌ها
</h2>



<div id="history">

درخواستی وجود ندارد

</div>



</div>







<nav>


<a href="index.html">

خانه

</a>



<a href="games.html">

بازی‌ها

</a>



<a href="wallet.html">

کیف پول

</a>



<a href="profile.html">

پروفایل

</a>


</nav>







<script>


let data =

JSON.parse(localStorage.getItem("royalData")) || {

coins:0

};




document.getElementById("coins").innerHTML =

data.coins.toLocaleString();



document.getElementById("balance").innerHTML =

data.coins.toLocaleString();





let charge =

JSON.parse(localStorage.getItem("walletRequests")) || [];



let withdraw =

JSON.parse(localStorage.getItem("withdrawRequests")) || [];





let box = document.getElementById("history");



if(charge.length==0 && withdraw.length==0){


box.innerHTML="درخواستی وجود ندارد";


}

else{


box.innerHTML="";



charge.forEach(item=>{


box.innerHTML +=

`

<p>

🪙 شارژ:

${item.coins.toLocaleString()}

<br>

وضعیت:

${item.status}

</p>

<hr>

`;



});





withdraw.forEach(item=>{


box.innerHTML +=

`

<p>

💸 برداشت:

${item.money.toLocaleString()}

تومان

<br>

وضعیت:

${item.status}

</p>

<hr>

`;



});



}


</script>



</body>

</html>
